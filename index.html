<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vast Galaxy | 美国海外仓 - 版本选择</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #04080F;
      color: #F0F2F8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      text-align: center;
      max-width: 720px;
    }
    .logo {
      height: 64px;
      margin-bottom: 32px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .sub {
      color: #8B9CC0;
      font-size: 15px;
      margin-bottom: 48px;
      line-height: 1.7;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 560px) {
      .cards { grid-template-columns: 1fr; }
    }
    .card {
      display: block;
      background: #111D33;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px 28px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(201,168,76,0.3);
      box-shadow: 0 16px 48px rgba(201,168,76,0.1);
    }
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover::before { opacity: 1; }
    .badge {
      display: inline-block;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      color: #C9A84C;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 100px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .card h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card p {
      font-size: 14px;
      color: #8B9CC0;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #C9A84C;
      color: #04080F;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 24px;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .card:hover .btn {
      background: #E4C76B;
      box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="public/vast logo.png" alt="Vast Galaxy" class="logo">
    <h1>Vast Galaxy 美国海外仓</h1>
    <p class="sub">洛杉矶 Chino, CA — 两个版本的官网设计，请选择查看</p>
    <div class="cards">
      <a href="v1/" class="card">
        <span class="badge">Version 1</span>
        <h2>V1 经典版</h2>
        <p>蓝色科技风格，完整功能展示，清晰的信息架构与传统 B2B 布局。</p>
        <span class="btn">查看 V1 <span>&rarr;</span></span>
      </a>
      <a href="v2/" class="card">
        <span class="badge">Version 2</span>
        <h2>V2 银河穹顶</h2>
        <p>电影级暗色奢华风格，高互动 Motion 设计，打字机效果与粒子动画。</p>
        <span class="btn">查看 V2 <span>&rarr;</span></span>
      </a>
    </div>
  </div>
</body>
</html>
